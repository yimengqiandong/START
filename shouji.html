<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <script src="index.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qiandong起始页</title>
    <style>
      body {
        background-image: url("1.jpg");
        background-size: cover;
        background-repeat: no-repeat;
      }
      input[type="button"] {
        width: 305px;
        height: 35px;
        background-color: #01be07;
        color: white;

        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      input[type="button"]:hover {
        background-color: #009905;
      }
    </style>
  </head>
  <body>
    <!--跳转手机版-->
    <div
      style="
        text-align: center; /* 文本中央 */
        background-color: #f2f2f2; /* 背景 */
        opacity: 0.9;
        width: 500px; /*宽度*/
        height: 300px; /*高度*/
        border-radius: 6px;
        position: absolute;
        left: 50%;
        top: 30%; /*位置高度*/
        transform: translate(-50%, -50%); /* 中央 */
      "
    >
      <h1>起始页</h1>
      <br />

      <input
        type="password"
        value=""
        id="myInput"
        placeholder="请输入密钥"
        style="
          width: 300px;
          height: 30px;
          display: inline;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      /><br /><br />

      <input id="button" type="button" value="提交" onclick="ty()" />
    </div>
  </body>
</html>
