<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qiandong起始页(手机端)</title>
    <style>
      .btn:active {
        background-color: #4caf50;
        color: white;
        transform: translateY(2px);
      }
      body {
        background-size: cover;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body onload="tiaozhuan()">
    <div
      style="
        text-align: center; /* 文本中央 */
        background-color: #f2f2f2; /* 背景 */
        height: 230px; /*高度*/
        border-radius: 6px;
        position: absolute;
        top: 3%; /*位置高度*/
        opacity: 0.9;
        right: 5px;
        left: 5px;
        margin: auto; /*左右居中*/
        width: 90%;
        padding: 10px;
      "
    >
      <h1>起始页</h1>
      <br />

      <input
        type="password"
        value=""
        id="myInput"
        placeholder="请输入密钥"
        style="
          width: 300px;
          height: 30px;
          display: inline;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      /><br /><br />
      <button
        class="btn"
        style="
          width: 305px;
          height: 35px;
          background-color: #01be07;
          color: white;

          border: none;
          border-radius: 4px;
          cursor: pointer;
        "
        onclick="ty()"
      >
        提交
      </button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
